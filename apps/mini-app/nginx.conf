server {
    listen 3001;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint (always allowed)
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Cache static assets (always allowed)
    location /_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Access denied page (must be accessible without Telegram check)
    location = /passkey-access-denied {
        try_files /passkey-access-denied.html =404;
    }
    location = /passkey-access-denied.html {
        internal;
    }

    # Main app - Telegram only
    location / {
        # Allow if User-Agent contains "telegram" (case insensitive)
        if ($http_user_agent ~* "telegram") {
            set $allowed "yes";
        }

        # Allow if referer is from Telegram domains
        if ($http_referer ~* "t\.me|telegram\.org") {
            set $allowed "yes";
        }

        # Allow if tgWebApp params present
        if ($args ~* "tgWebApp") {
            set $allowed "yes";
        }

        # Block if not allowed
        if ($allowed != "yes") {
            return 302 /passkey-access-denied;
        }

        try_files $uri $uri.html $uri/ /index.html;
    }
}
