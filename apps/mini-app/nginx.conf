server {
    listen 3001;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint (always allowed)
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Cache static assets (always allowed)
    location /_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Access denied page (must be accessible without Telegram check)
    location = /passkey-access-denied {
        try_files /passkey-access-denied.html =404;
    }
    location = /passkey-access-denied.html {
        internal;
    }

    # dApp approval page (CIP-103) - accessible without Telegram check
    location = /approve {
        try_files /approve.html =404;
    }

    # API proxy to bot container
    location /api/ {
        proxy_pass http://bot:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Auth proxy to bot container
    location /auth/ {
        proxy_pass http://bot:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook proxy to bot container
    location /webhook {
        proxy_pass http://bot:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main app - Telegram only
    location / {
        # Initialize allowed variable
        set $allowed "no";

        # Allow if User-Agent contains "telegram" (case insensitive)
        if ($http_user_agent ~* "telegram") {
            set $allowed "yes";
        }

        # Allow if referer is from Telegram domains
        if ($http_referer ~* "t\.me|telegram\.org|tg://") {
            set $allowed "yes";
        }

        # Allow if tgWebApp params present in query string
        if ($args ~* "tgWebApp") {
            set $allowed "yes";
        }

        # Allow iOS WebView (Telegram Mini App uses WKWebView)
        # Check for Mobile/15E148 pattern with no Safari (indicates in-app browser)
        if ($http_user_agent ~* "Mobile/[0-9A-Z]+ *$") {
            set $allowed "yes";
        }

        # Allow if X-Requested-With header indicates Telegram
        if ($http_x_requested_with ~* "org.telegram") {
            set $allowed "yes";
        }

        # Block if not allowed
        if ($allowed != "yes") {
            return 302 /passkey-access-denied;
        }

        try_files $uri $uri.html $uri/ /index.html;
    }
}
