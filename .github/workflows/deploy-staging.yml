name: Deploy Staging

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  BOT_IMAGE: ghcr.io/${{ github.repository }}/bot
  MINI_APP_IMAGE: ghcr.io/${{ github.repository }}/mini-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/bot/Dockerfile
          push: true
          tags: ${{ env.BOT_IMAGE }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Mini App image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/mini-app/Dockerfile
          push: true
          tags: ${{ env.MINI_APP_IMAGE }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" << 'DEPLOY_SCRIPT'
            cd /opt/canton-wallet-staging

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Run migrations
            docker compose -f docker-compose.prod.yml run --rm bot pnpm drizzle-kit migrate

            # Restart services
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Cleanup
            docker image prune -f
          DEPLOY_SCRIPT

      - name: Verify deployment
        env:
          HEALTH_URL: ${{ secrets.STAGING_HEALTH_URL }}
        run: |
          sleep 20
          curl -sf "$HEALTH_URL" && echo "Staging deployment successful!"
